<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
            background: #fff;
        }

        nav {
            background: #24292e;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 10;
            height: 48px;
            display: flex;
            align-items: center;
        }
        nav .site-title {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        main {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 24px;
        }

        #content h1, #content h2, #content h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 6px;
        }
        #content h1 { font-size: 2em; }
        #content h2 { font-size: 1.5em; }
        #content h3 { font-size: 1.25em; border-bottom: none; }
        #content p { margin-bottom: 16px; }
        #content a { color: #0366d6; text-decoration: none; }
        #content a:hover { text-decoration: underline; }
        #content ul, #content ol { margin-bottom: 16px; padding-left: 2em; }

        #content code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 85%;
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 3px;
        }
        #content pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        #content pre code { background: none; padding: 0; font-size: 85%; }

        #content table { border-collapse: collapse; margin-bottom: 16px; width: 100%; }
        #content th, #content td { border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }
        #content th { background: #f6f8fa; font-weight: 600; }

        #content blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 16px;
            color: #6a737d;
            margin-bottom: 16px;
        }

        .page-index a {
            display: block;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            color: #0366d6;
            text-decoration: none;
            transition: background 0.15s;
        }
        .page-index a:hover { background: #f6f8fa; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="site-title" data-page="">Notes</a>
</nav>

<main>
    <div id="content"></div>
</main>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const contentEl = document.getElementById('content');

    const HOME_HTML = `
        <h1>Notes</h1>
        <p>Constructors</p>
        <div class="page-index">
            <a href="#" data-page="constructors/basics">Basics</a>
            <a href="#" data-page="constructors/initialization">Initialization</a>
        </div>
        <p>Storage</p>
        <div class="page-index">
            <a href="#" data-page="storage/new">new</a>
            <a href="#" data-page="storage/launder">std::launder</a>
        </div>
        <p>Examples</p>
        <div class="page-index">
            <a href="#" data-page="examples/memory_pool">Memory Pool</a>
            <a href="#" data-page="examples/unique_ptr">Unique Pointer</a>
            <a href="#" data-page="examples/any">Any</a>
            <a href="#" data-page="examples/vector">Vector</a>
            <a href="#" data-page="examples/spsc_ring_buffer">SPSC Ring Buffer</a>
        </div>
        <p>Containers</p>
        <div class="page-index">
            <a href="#" data-page="containers/ranges">Containers: Ranges</a>
        </div>
        <p>Concurrency</p>
        <div class="page-index">
            <a href="#" data-page="concurrency/memory_barriers">Memory Barriers</a>
            <a href="#" data-page="concurrency/affinity">Affinity</a>
            <a href="#" data-page="concurrency/spin_lock">Spin Lock</a>
        </div>
        <p>Theory</p>
        <div class="page-index">
            <a href="#" data-page="theory/abstract_machine">Abstract Machine</a>
            <a href="#" data-page="theory/aliasing">Aliasing</a>
        </div>
    `;

    async function loadPage(pagePath) {
        if (!pagePath) {
            contentEl.innerHTML = HOME_HTML;
            document.title = 'Notes';
            return;
        }

        contentEl.innerHTML = '<p>Loading...</p>';

        try {
            const resp = await fetch(`${pagePath}.md`);
            if (!resp.ok) throw new Error(`Page not found (${resp.status})`);
            const md = await resp.text();
            contentEl.innerHTML = marked.parse(md);
            hljs.highlightAll();
            document.title = pagePath.split('/').pop() + ' - Notes';
        } catch (err) {
            contentEl.innerHTML = `<h1>404</h1><p>Could not load <code>${pagePath}.md</code></p>`;
        }

        window.scrollTo(0, 0);
    }

    document.addEventListener('click', e => {
        const link = e.target.closest('a[data-page]');
        if (!link) return;
        e.preventDefault();
        const page = link.dataset.page;
        history.pushState({ page }, '', page ? `#${page}` : '#');
        loadPage(page);
    });

    window.addEventListener('popstate', e => {
        loadPage(e.state?.page || location.hash.slice(1) || '');
    });

    loadPage(location.hash.slice(1) || '');
</script>

</body>
</html>
