<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
            background: #fff;
        }

        /* --- Navigation --- */
        nav {
            background: #24292e;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            height: 48px;
        }
        nav .site-title {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            margin-right: 32px;
            flex-shrink: 0;
        }

        /* Dropdown container */
        .nav-dropdown {
            position: relative;
            margin-right: 4px;
        }
        .nav-dropdown-toggle {
            background: none;
            border: none;
            color: #fff;
            font-size: 14px;
            padding: 14px 12px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.15s;
            font-family: inherit;
        }
        .nav-dropdown-toggle:hover,
        .nav-dropdown.open .nav-dropdown-toggle {
            opacity: 1;
        }
        .nav-dropdown-toggle::after {
            content: ' ▾';
            font-size: 10px;
        }

        /* Dropdown menu */
        .nav-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            min-width: 200px;
            padding: 4px 0;
            z-index: 20;
        }
        .nav-dropdown.open .nav-dropdown-menu {
            display: block;
        }
        .nav-dropdown-menu a {
            display: block;
            padding: 8px 16px;
            color: #24292e;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.1s;
        }
        .nav-dropdown-menu a:hover {
            background: #f6f8fa;
        }
        .nav-dropdown-menu a.active {
            color: #0366d6;
            font-weight: 600;
        }

        /* --- Main content area --- */
        main {
            max-width: 860px;
            margin: 40px auto;
            padding: 0 24px;
        }

        /* --- Markdown-rendered content styling --- */
        #content h1, #content h2, #content h3 {
            margin-top: 24px;
            margin-bottom: 12px;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 6px;
        }
        #content h1 { font-size: 2em; }
        #content h2 { font-size: 1.5em; }
        #content h3 { font-size: 1.25em; border-bottom: none; }

        #content p { margin-bottom: 16px; }

        #content a { color: #0366d6; text-decoration: none; }
        #content a:hover { text-decoration: underline; }

        #content ul, #content ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }

        /* Code blocks */
        #content code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 85%;
            background: #f6f8fa;
            padding: 2px 6px;
            border-radius: 3px;
        }
        #content pre {
            background: #f6f8fa;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        #content pre code {
            background: none;
            padding: 0;
            font-size: 85%;
        }

        /* Tables */
        #content table {
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }
        #content th, #content td {
            border: 1px solid #dfe2e5;
            padding: 8px 12px;
            text-align: left;
        }
        #content th { background: #f6f8fa; font-weight: 600; }

        /* Blockquotes */
        #content blockquote {
            border-left: 4px solid #dfe2e5;
            padding: 0 16px;
            color: #6a737d;
            margin-bottom: 16px;
        }

        /* Home page link cards */
        .page-index a {
            display: block;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            color: #0366d6;
            text-decoration: none;
            transition: background 0.15s;
        }
        .page-index a:hover { background: #f6f8fa; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="site-title" data-page="">Notes</a>

    <div class="nav-dropdown">
        <button class="nav-dropdown-toggle">Constructors</button>
        <div class="nav-dropdown-menu">
            <a href="#" data-page="constructors/basics">Basics</a>
            <a href="#" data-page="constructors/initialization">Initialization</a>
        </div>
    </div>

    <div class="nav-dropdown">
        <button class="nav-dropdown-toggle">Storage</button>
        <div class="nav-dropdown-menu">
            <a href="#" data-page="storage/new">new</a>
            <a href="#" data-page="storage/launder">std::launder</a>
        </div>
    </div>

    <div class="nav-dropdown">
        <button class="nav-dropdown-toggle">Examples</button>
        <div class="nav-dropdown-menu">
            <a href="#" data-page="examples/memory_pool">Memory Pool</a>
            <a href="#" data-page="examples/unique_ptr">Unique Pointer</a>
            <a href="#" data-page="examples/any">Any</a>
            <a href="#" data-page="examples/vector">Vector</a>
        </div>
    </div>

    <div class="nav-dropdown">
        <button class="nav-dropdown-toggle">Containers</button>
        <div class="nav-dropdown-menu">
            <a href="#" data-page="containers/ranges">Ranges</a>
        </div>
    </div>
</nav>

<main>
    <div id="content">
        <!-- Content is loaded here dynamically -->
    </div>
</main>

<!-- highlight.js: syntax highlighting -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>

<!-- marked.js: lightweight Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const contentEl = document.getElementById('content');

    // ---- Home page content (shown when no page is selected) ----
    const HOME_HTML = `
        <h1>Welcome</h1>
        <p>Pick a topic from the navigation bar, or from the list below:</p>
        <div class="page-index">
            <a href="#" data-page="constructors/basics">Constructors: Basics</a>
            <a href="#" data-page="constructors/initialization">Constructors: Initialization</a>
            <a href="#" data-page="storage/new">Storage: new</a>
            <a href="#" data-page="storage/launder">Storage: std::launder</a>
            <a href="#" data-page="examples/memory_pool">Example: Memory Pool</a>
            <a href="#" data-page="examples/unique_ptr">Example: Unique Pointer</a>
            <a href="#" data-page="examples/any">Example: Any</a>
            <a href="#" data-page="examples/vector">Example: Vector</a>
            <a href="#" data-page="containers/ranges">Containers: Ranges</a>
        </div>
    `;

    // ---- Load a markdown file and render it ----
    async function loadPage(pagePath) {
        if (!pagePath) {
            contentEl.innerHTML = HOME_HTML;
            updateActiveNav('');
            document.title = 'Notes';
            return;
        }

        contentEl.innerHTML = '<p>Loading...</p>';

        try {
            const resp = await fetch(`${pagePath}.md`);
            if (!resp.ok) throw new Error(`Page not found (${resp.status})`);
            const md = await resp.text();
            contentEl.innerHTML = marked.parse(md);
            hljs.highlightAll();
            document.title = pagePath.split('/').pop() + ' - Notes';
        } catch (err) {
            contentEl.innerHTML = `<h1>404</h1><p>Could not load <code>${pagePath}.md</code></p>`;
        }

        updateActiveNav(pagePath);
        window.scrollTo(0, 0);
    }

    // ---- Highlight the active nav link ----
    function updateActiveNav(pagePath) {
        document.querySelectorAll('.nav-dropdown-menu a').forEach(a => {
            a.classList.toggle('active', a.dataset.page === pagePath);
        });
    }

    // ---- Dropdown toggle logic ----
    document.querySelectorAll('.nav-dropdown-toggle').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const dropdown = btn.parentElement;
            const wasOpen = dropdown.classList.contains('open');
            // Close all dropdowns first
            document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
            if (!wasOpen) dropdown.classList.add('open');
        });
    });

    // Close dropdowns when clicking outside
    document.addEventListener('click', () => {
        document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
    });

    // ---- Navigation click handler (for data-page links in nav and home) ----
    document.addEventListener('click', e => {
        const link = e.target.closest('a[data-page]');
        if (!link) return;
        e.preventDefault();
        const page = link.dataset.page;
        history.pushState({ page }, '', page ? `#${page}` : '#');
        loadPage(page);
        // Close any open dropdown
        document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
    });

    // ---- Handle browser back/forward ----
    window.addEventListener('popstate', e => {
        loadPage(e.state?.page || location.hash.slice(1) || '');
    });

    // ---- Initial load ----
    loadPage(location.hash.slice(1) || '');
</script>

</body>
</html>
